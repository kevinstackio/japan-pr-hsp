name: Deploy VitePress site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build VitePress site
        run: pnpm run docs:build
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  reindex_algolia:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ needs.deploy.result == 'success' && secrets.ALGOLIA_CRAWLER_ID != '' && secrets.ALGOLIA_CRAWLER_USER_ID != '' && secrets.ALGOLIA_CRAWLER_API_KEY != '' }}
    steps:
      - name: Trigger Algolia crawler reindex
        env:
          CRAWLER_ID: ${{ secrets.ALGOLIA_CRAWLER_ID }}
          CRAWLER_USER_ID: ${{ secrets.ALGOLIA_CRAWLER_USER_ID }}
          CRAWLER_API_KEY: ${{ secrets.ALGOLIA_CRAWLER_API_KEY }}
        run: |
          auth="$(printf '%s:%s' "$CRAWLER_USER_ID" "$CRAWLER_API_KEY" | base64 | tr -d '\n')"
          response="$(curl --silent --show-error --fail \
            --request POST \
            --url "https://crawler.algolia.com/api/1/crawlers/${CRAWLER_ID}/reindex" \
            --header "Authorization: Basic ${auth}")"
          echo "Crawler reindex triggered: ${response}"
